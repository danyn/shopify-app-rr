client_id = "6894f22e39e185bef9dada4628044f8a"
name = "cf-sf-app-0-dev"
handle = "cf-sf-app-0-dev"
application_url = "https://dev-tunnel.minder.solutions"
embedded = true

######################################
# Metaobject Definitions 
# https://shopify.dev/docs/apps/build/metafields/list-of-data-types#declarative-toml-type-syntax
#######################################

##################################
# Nutrition Panel
##################################
# Translatable field types: single_line_text_field, json
# Non-translatable types: number_integer, number_decimal, boolean, file_reference, product_reference,
#                         color, date, date_time, dimension, volume, weight, all reference types

[metaobjects.app.nutrition_panel]
name = "Nutrition Panel"
description = "Nutrition information for products"
access.admin = "merchant_read_write"
access.storefront = "public_read"
capabilities.publishable = true
capabilities.translatable = true

# TRANSLATABLE FIELDS
[metaobjects.app.nutrition_panel.fields.name]
name = "Name"
type = "single_line_text_field"  # ✅ Translatable

# NON-TRANSLATABLE FIELDS
[metaobjects.app.nutrition_panel.fields.calories]
name = "Calories"
type = "number_integer"  # ❌ NOT translatable

[metaobjects.app.nutrition_panel.fields.protein]
name = "Protein (g)"
type = "number_decimal"  # ❌ NOT translatable

[metaobjects.app.nutrition_panel.fields.carbs]
name = "Carbs (g)"
type = "number_decimal"  # ❌ NOT translatable

[metaobjects.app.nutrition_panel.fields.image]
name = "Nutrition Panel Image"
type = "file_reference"  # ❌ NOT translatable

[metaobjects.app.nutrition_panel.fields.product_reference]
name = "Product"
type = "product_reference"  # ❌ NOT translatable

# NEW TRANSLATABLE JSON FIELD
[metaobjects.app.nutrition_panel.fields.nutrition_details]
name = "Nutrition Details (JSON)"
type = "json"  # ✅ Translatable
description = "Structured nutrition data with translatable labels. Example: {\"nutrients\": [{\"name\": \"Sodium\", \"unit\": \"mg\", \"value\": 50}]}"

####################
# Recipe
####################
[metaobjects.app.recipe]
name = "Recipe"
description = "Recipe content for articles"
access.admin = "merchant_read_write"
access.storefront = "public_read"
capabilities.publishable = true

[metaobjects.app.recipe.fields.title]
name = "Title"
type = "single_line_text_field"

[metaobjects.app.recipe.fields.description]
name = "Description"
type = "multi_line_text_field"

[metaobjects.app.recipe.fields.cook_time]
name = "Cook Time (minutes)"
type = "number_integer"

[metaobjects.app.recipe.fields.article_reference]
name = "Article"
type = "article_reference"

# https://shopify.dev/docs/apps/build/metaobjects/manage-metaobjects#step-1-create-definitions
# https://shopify.dev/docs/apps/build/metafields#step-1-create-the-metafield-definition
##############################
# Metafield Definitions
[product.metafields.app.nutrition_panel]
name = "Nutrition Panel"
description = "Link to nutrition panel metaobject"
type = "metaobject_reference<$app:nutrition_panel>"

[article.metafields.app.recipe]
name = "Recipe"
description = "Link to recipe metaobject"
type = "metaobject_reference<$app:recipe>"

[product.metafields.app--test.boolean]
name = "Test a boolean"
description = "test a boolean metafield"
type = "boolean"


[build]
automatically_update_urls_on_dev = false

[webhooks]
api_version = "2025-04"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/webhooks/app/uninstalled"

  [[webhooks.subscriptions]]
  topics = [ "app/scopes_update" ]
  uri = "/webhooks/app/scopes_update"




[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
# https://shopify.dev/docs/api/usage/access-scopes
scopes = "read_markets,read_markets_home,read_metaobject_definitions,write_metaobject_definitions,read_metaobjects,write_metaobjects,read_themes,read_translations,write_translations, read_products, write_products, read_content, write_content, write_files, read_files"
[auth]
redirect_urls = [ ]

[pos]
embedded = false

use_legacy_install_flow = false
